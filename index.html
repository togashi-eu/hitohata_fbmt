<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>習熟度確認テスト出題アプリ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #1B3A5C; /* ネイビー */
            --accent-color: #00897B;  /* ティール */
            --bg-color: #F8F9FA;
            --text-color: #1A1A1A;
            --border-color: #DDE2E5;
            --correct-bg: #E8F5E9;
            --gray-out: #BDBDBD;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Layout --- */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--accent-color);
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* --- Components --- */
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        button.btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button.btn-primary:hover { opacity: 0.9; }

        input[type="file"] { display: none; }

        .hidden { display: none !important; }

        /* --- Mode 1: Browser --- */
        .browser-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .filter-group select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .question-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .question-table th, .question-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .question-table tr:hover { background: #f1f5f9; }

        /* --- Mode 2: Builder --- */
        .builder-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .checkbox-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
        }

        .checkbox-item {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .set-list {
            margin-top: 30px;
            border-top: 2px solid var(--primary-color);
            padding-top: 20px;
        }

        .set-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: white;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            border-radius: 4px;
        }

        .set-item-actions { margin-left: auto; display: flex; gap: 5px; }

        /* --- Mode 3: Presenter (The Slide) --- */
        #mode-presenter {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        .slide-area {
            padding: 40px;
        }

        .slide-content {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .slide-meta-left { position: absolute; top: 20px; left: 30px; font-size: 14px; color: #666; }
        .slide-meta-right { position: absolute; top: 20px; right: 30px; font-size: 14px; color: #666; }

        .slide-question-text {
            font-size: 28px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }

        .options-list { list-style: none; width: 100%; }
        .option-item {
            font-size: 22px;
            padding: 15px 25px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #f0f0f0;
            transition: 0.3s;
        }

        .option-item.correct {
            background-color: var(--correct-bg);
            border-color: var(--accent-color);
            font-weight: bold;
        }

        .option-item.wrong { color: var(--gray-out); }

        .fill-blank-box {
            font-size: 24px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid var(--accent-color);
            margin-top: 20px;
        }

        .case-study-box { margin-top: 20px; }
        .model-answer { background: #E3F2FD; padding: 20px; border-radius: 8px; margin-top: 20px; font-size: 28px; line-height: 1.6; }
        .scoring-points { margin-top: 15px; font-size: 18px; }

        .instructor-note {
            margin-top: auto;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }

        .explanation-toggle {
            font-size: 14px;
            color: var(--accent-color);
            cursor: pointer;
            text-decoration: underline;
        }

        .explanation-body {
            font-size: 28px;
            background: #fff9c4;
            padding: 20px 25px;
            margin-top: 10px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .points-body {
            font-size: 28px;
            background: #E8F4FD;
            border-left: 5px solid var(--primary-color);
            padding: 20px 25px;
            margin-top: 20px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .points-body h4 {
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 16px;
        }

        .presenter-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
            z-index: 1001;
        }

        .presenter-controls button {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Loading UI */
        #empty-state {
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">習熟度確認テスト</div>
    <nav id="main-nav" class="hidden">
        <button onclick="switchMode('browser')" id="nav-browser">問題ブラウザ</button>
        <button onclick="switchMode('builder')" id="nav-builder">セットビルダー</button>
    </nav>
    <button class="btn-primary" onclick="document.getElementById('csvFile').click()">CSVを読み込む</button>
    <input type="file" id="csvFile" accept=".csv" onchange="handleFileUpload(event)">
</header>

<main class="container">
    <div id="empty-state">
        <h2>CSVファイルを読み込んでください</h2>
        <p>「回, 問題番号, セクション, Level, 問題文...」の形式のCSVを選択してください。</p>
    </div>

    <!-- Mode 1: Browser -->
    <div id="mode-browser" class="hidden">
        <div class="filter-bar">
            <div class="filter-group">
                <label>回：</label>
                <select id="filter-round" onchange="applyBrowserFilter()"></select>
            </div>
            <div class="filter-group">
                <label>種類：</label>
                <select id="filter-type" onchange="applyBrowserFilter()">
                    <option value="すべて">すべて</option>
                    <option value="三択問題">三択問題</option>
                    <option value="穴埋め問題">穴埋め問題</option>
                    <option value="ケーススタディ">ケーススタディ</option>
                </select>
            </div>
            <div class="filter-group">
                <label>レベル：</label>
                <select id="filter-level" onchange="applyBrowserFilter()">
                    <option value="すべて">すべて</option>
                    <option value="Level 1">Level 1</option>
                    <option value="Level 2">Level 2</option>
                    <option value="Level 3">Level 3</option>
                    <option value="Level 3+">Level 3+</option>
                </select>
            </div>
        </div>

        <div class="browser-layout">
            <div class="card" style="overflow-x: auto;">
                <table class="question-table">
                    <thead>
                        <tr>
                            <th>回</th>
                            <th>No</th>
                            <th>種類</th>
                            <th>Level</th>
                            <th>問題文（冒頭）</th>
                        </tr>
                    </thead>
                    <tbody id="browser-list"></tbody>
                </table>
            </div>
            <div class="card" id="browser-preview">
                <p style="color: #666;">問題を選択するとプレビューが表示されます</p>
            </div>
        </div>
    </div>

    <!-- Mode 2: Builder -->
    <div id="mode-builder" class="hidden">
        <div class="card">
            <h3>ステップ1：フィルターで絞り込む</h3>
            <div class="builder-filters">
                <div>
                    <label><strong>回</strong></label>
                    <div style="margin-bottom: 5px;">
                        <button onclick="checkAll('round', true)">全選択</button>
                        <button onclick="checkAll('round', false)">解除</button>
                    </div>
                    <div id="build-filter-rounds" class="checkbox-list"></div>
                </div>
                <div>
                    <label><strong>種類</strong></label>
                    <div id="build-filter-types" class="checkbox-list">
                        <label class="checkbox-item"><input type="checkbox" value="三択問題" checked> 三択問題</label>
                        <label class="checkbox-item"><input type="checkbox" value="穴埋め問題" checked> 穴埋め問題</label>
                        <label class="checkbox-item"><input type="checkbox" value="ケーススタディ" checked> ケーススタディ</label>
                    </div>
                </div>
                <div>
                    <label><strong>レベル</strong></label>
                    <div id="build-filter-levels" class="checkbox-list">
                        <label class="checkbox-item"><input type="checkbox" value="Level 1" checked> Level 1</label>
                        <label class="checkbox-item"><input type="checkbox" value="Level 2" checked> Level 2</label>
                        <label class="checkbox-item"><input type="checkbox" value="Level 3" checked> Level 3</label>
                        <label class="checkbox-item"><input type="checkbox" value="Level 3+" checked> Level 3+</label>
                    </div>
                </div>
            </div>
            <button class="btn-primary" onclick="applyBuilderFilter()">この条件で問題をリストアップ</button>
        </div>

        <div class="card">
            <h3>ステップ2：問題を選ぶ（最大5問）</h3>
            <div style="max-height: 300px; overflow-y: auto;">
                <table class="question-table">
                    <thead>
                        <tr>
                            <th>選択</th>
                            <th>回</th>
                            <th>No</th>
                            <th>種類</th>
                            <th>問題文</th>
                        </tr>
                    </thead>
                    <tbody id="builder-search-results"></tbody>
                </table>
            </div>
        </div>

        <div class="set-list card">
            <h3>現在のセット（ステップ3 & 4）</h3>
            <div id="builder-set-items"></div>
            <div style="margin-top: 20px;">
                <button class="btn-primary" id="btn-start-set" onclick="startSetPresenter()" disabled>このセットでスライド開始</button>
            </div>
        </div>
    </div>
</main>

<!-- Mode 3: Presenter -->
<div id="mode-presenter" class="hidden">
    <div class="slide-area">
        <div id="slide-container" class="slide-content">
            <!-- Slide content injected here -->
        </div>
    </div>
    <div class="presenter-controls">
        <button onclick="toggleAnswer()" id="btn-toggle-answer">正解を表示</button>
        <button onclick="togglePoints()" id="btn-toggle-points">第◯回のポイント</button>
        <div style="color: white; display: flex; align-items: center; gap: 10px;">
            <button onclick="prevSlide()" id="btn-prev-slide">前の問題</button>
            <span id="slide-counter">1 / 1</span>
            <button onclick="nextSlide()" id="btn-next-slide">次の問題</button>
        </div>
        <button onclick="exitPresenter()" style="background: #e53935; color: white;">一覧に戻る</button>
    </div>
</div>

<script>
    let allData = [];
    let selectedSet = [];
    let currentMode = 'browser';
    let presenterQueue = [];
    let currentSlideIdx = 0;
    let isAnswerShowing = false;
    let isPointsShowing = false;

    // --- Data Loading ---
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                initApp();
            }
        });
    }

    function initApp() {
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('main-nav').classList.remove('hidden');
        
        // Init Filters
        const rounds = [...new Set(allData.map(item => item.回))].sort((a,b) => a-b);
        const filterRound = document.getElementById('filter-round');
        filterRound.innerHTML = '<option value="すべて">全回</option>';
        rounds.forEach(r => {
            filterRound.innerHTML += `<option value="${r}">第${r}回</option>`;
        });

        const buildRoundFilter = document.getElementById('build-filter-rounds');
        buildRoundFilter.innerHTML = '';
        rounds.forEach(r => {
            buildRoundFilter.innerHTML += `
                <label class="checkbox-item">
                    <input type="checkbox" name="round" value="${r}" checked> 第${r}回
                </label>`;
        });

        switchMode('browser');
        applyBrowserFilter();
    }

    // --- Navigation ---
    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('main > div, #mode-presenter').forEach(el => el.classList.add('hidden'));
        document.getElementById(`mode-${mode}`).classList.remove('hidden');
        
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        const navBtn = document.getElementById(`nav-${mode}`);
        if(navBtn) navBtn.classList.add('active');

        if(mode === 'browser') applyBrowserFilter();
    }

    // --- Mode 1: Browser Logic ---
    function applyBrowserFilter() {
        const r = document.getElementById('filter-round').value;
        const t = document.getElementById('filter-type').value;
        const l = document.getElementById('filter-level').value;

        const filtered = allData.filter(d => {
            return (r === 'すべて' || d.回 == r) &&
                   (t === 'すべて' || d.セクション == t) &&
                   (l === 'すべて' || d.Level == l);
        });

        renderBrowserList(filtered);
    }

    function renderBrowserList(data) {
        const tbody = document.getElementById('browser-list');
        tbody.innerHTML = '';
        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.回}</td>
                <td>${item.問題番号}</td>
                <td>${item.セクション}</td>
                <td>${item.Level}</td>
                <td title="${item.問題文}">${item.問題文.substring(0, 30)}...</td>
            `;
            tr.onclick = () => showPreview(item);
            tbody.appendChild(tr);
        });
    }

    function showPreview(item) {
        const preview = document.getElementById('browser-preview');
        preview.innerHTML = `
            <h3>第${item.回}回 ${item.問題番号}</h3>
            <p><strong>種類:</strong> ${item.セクション} / <strong>Level:</strong> ${item.Level}</p>
            <hr style="margin:10px 0">
            <p style="white-space:pre-wrap">${item.問題文}</p>
            <div id="preview-answer" class="hidden" style="margin-top:15px; background:#f0f7f0; padding:10px;">
                <p><strong>正解:</strong> ${item.正解}</p>
                <p><strong>解説:</strong> ${item.解説}</p>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="togglePreviewAnswer()">正解を表示</button>
                <button class="btn-primary" style="background:var(--primary-color)" onclick="startSinglePresenter('${item.回}', '${item.問題番号}')">この問題をスライド表示</button>
            </div>
        `;
    }

    function togglePreviewAnswer() {
        document.getElementById('preview-answer').classList.toggle('hidden');
    }

    // --- Mode 2: Builder Logic ---
    function checkAll(name, state) {
        document.querySelectorAll(`input[name="${name}"]`).forEach(cb => cb.checked = state);
    }

    function applyBuilderFilter() {
        const rounds = Array.from(document.querySelectorAll('#build-filter-rounds input:checked')).map(cb => cb.value);
        const types = Array.from(document.querySelectorAll('#build-filter-types input:checked')).map(cb => cb.value);
        const levels = Array.from(document.querySelectorAll('#build-filter-levels input:checked')).map(cb => cb.value);

        const filtered = allData.filter(d => 
            rounds.includes(String(d.回)) && 
            types.includes(d.セクション) && 
            levels.includes(d.Level)
        );

        const tbody = document.getElementById('builder-search-results');
        tbody.innerHTML = '';
        filtered.forEach(item => {
            const tr = document.createElement('tr');
            const isSelected = selectedSet.some(s => s.回 == item.回 && s.問題番号 == item.問題番号);
            tr.innerHTML = `
                <td><input type="checkbox" onchange="toggleSelectQuestion(this)" 
                    data-id="${item.回}-${item.問題番号}" ${isSelected ? 'checked' : ''}></td>
                <td>${item.回}</td>
                <td>${item.問題番号}</td>
                <td>${item.セクション}</td>
                <td>${item.問題文.substring(0, 30)}...</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleSelectQuestion(cb) {
        const id = cb.dataset.id;
        const [r, q] = id.split('-');
        
        if (cb.checked) {
            if (selectedSet.length >= 5) {
                alert("最大5問です");
                cb.checked = false;
                return;
            }
            const item = allData.find(d => d.回 == r && d.問題番号 == q);
            selectedSet.push(item);
        } else {
            selectedSet = selectedSet.filter(s => !(s.回 == r && s.問題番号 == q));
        }
        renderSet();
    }

    function renderSet() {
        const container = document.getElementById('builder-set-items');
        container.innerHTML = '';
        selectedSet.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'set-item';
            div.innerHTML = `
                <span style="margin-right:15px"><strong>${index+1}.</strong> 第${item.回}回-${item.問題番号}</span>
                <span>${item.セクション} (${item.Level}) : ${item.問題文.substring(0, 20)}...</span>
                <div class="set-item-actions">
                    <button onclick="moveInSet(${index}, -1)">↑</button>
                    <button onclick="moveInSet(${index}, 1)">↓</button>
                    <button onclick="removeFromSet(${index})" style="color:red">✕</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.getElementById('btn-start-set').disabled = selectedSet.length === 0;
    }

    function moveInSet(idx, dir) {
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= selectedSet.length) return;
        const temp = selectedSet[idx];
        selectedSet[idx] = selectedSet[newIdx];
        selectedSet[newIdx] = temp;
        renderSet();
    }

    function removeFromSet(idx) {
        selectedSet.splice(idx, 1);
        renderSet();
        applyBuilderFilter(); // Sync checkboxes
    }

    // --- Mode 3: Presenter Logic ---
    function startSinglePresenter(round, qNo) {
        const item = allData.find(d => d.回 == round && d.問題番号 == qNo);
        presenterQueue = [item];
        launchPresenter();
    }

    function startSetPresenter() {
        presenterQueue = [...selectedSet];
        launchPresenter();
    }

    function launchPresenter() {
        currentSlideIdx = 0;
        isAnswerShowing = false;
        switchMode('presenter');
        renderSlide();
    }

    function exitPresenter() {
        switchMode(presenterQueue.length > 1 ? 'builder' : 'browser');
    }

    function renderSlide() {
        const item = presenterQueue[currentSlideIdx];
        const container = document.getElementById('slide-container');
        isAnswerShowing = false;
        document.getElementById('btn-toggle-answer').innerText = "正解を表示";

        // Update navigation
        document.getElementById('slide-counter').innerText = `${currentSlideIdx + 1} / ${presenterQueue.length}`;
        document.getElementById('btn-prev-slide').disabled = currentSlideIdx === 0;
        document.getElementById('btn-next-slide').disabled = currentSlideIdx === presenterQueue.length - 1;

        // Base Template
        let contentHtml = `
            <div class="slide-meta-left">第${item.回}回 ${item.問題番号}</div>
            <div class="slide-meta-right">${item.セクション} / ${item.Level}</div>
            <div class="slide-question-text">${item.問題文}</div>
        `;

        // Section Specifics
        if (item.セクション === '三択問題') {
            contentHtml += `
                <ul class="options-list">
                    <li class="option-item" id="opt-A">A. ${item.選択肢A}</li>
                    <li class="option-item" id="opt-B">B. ${item.選択肢B}</li>
                    <li class="option-item" id="opt-C">C. ${item.選択肢C}</li>
                </ul>
            `;
        } else if (item.セクション === '穴埋め問題') {
            contentHtml = `
                <div class="slide-meta-left">第${item.回}回 ${item.問題番号}</div>
                <div class="slide-meta-right">${item.セクション} / ${item.Level}</div>
                <div style="font-size:20px; margin-top:40px;">次の（　　）に当てはまる言葉を答えてください。</div>
                <div class="slide-question-text" id="fill-question">「${item.問題文}」</div>
            `;
        } else if (item.セクション === 'ケーススタディ') {
            contentHtml += `
                <div id="case-answer-area" class="hidden">
                    <div class="model-answer">
                        <strong>【正解】</strong><br>${item.正解}
                    </div>
                </div>
            `;
        }

        // Round-level "学び" panel (toggled via control button)
        const manabi = item.学び || '';
        contentHtml += `
            <div id="points-body" class="points-body hidden">
                <h4>第${item.回}回のポイント</h4>
                ${manabi ? manabi.replace(/\n/g, '<br>') : '（この回の学びは登録されていません）'}
            </div>
        `;

        // Instructor Explanation Area (Foldable) — hidden for case studies
        if (item.セクション !== 'ケーススタディ') {
            contentHtml += `
                <div class="instructor-note">
                    <span class="explanation-toggle" onclick="document.getElementById('exp-body').classList.toggle('hidden')">
                        解説を確認する
                    </span>
                    <div id="exp-body" class="explanation-body hidden">${item.解説}</div>
                </div>
            `;
        }

        container.innerHTML = contentHtml;

        // Reset & sync points toggle for the new slide
        isPointsShowing = false;
        document.getElementById('btn-toggle-points').innerText = `第${item.回}回のポイント`;
    }

    function toggleAnswer() {
        const item = presenterQueue[currentSlideIdx];
        isAnswerShowing = !isAnswerShowing;
        document.getElementById('btn-toggle-answer').innerText = isAnswerShowing ? "正解を隠す" : "正解を表示";

        if (item.セクション === '三択問題') {
            ['A', 'B', 'C'].forEach(id => {
                const el = document.getElementById(`opt-${id}`);
                if (isAnswerShowing) {
                    if (item.正解.includes(id)) {
                        el.classList.add('correct');
                    } else {
                        el.classList.add('wrong');
                    }
                } else {
                    el.classList.remove('correct', 'wrong');
                }
            });
        } else if (item.セクション === '穴埋め問題') {
            const qEl = document.getElementById('fill-question');
            if (isAnswerShowing) {
                const highlighted = `<span style="color:var(--accent-color); text-decoration:underline;">${item.正解}</span>`;
                qEl.innerHTML = `「${item.問題文.replace('（　　）', highlighted).replace('(　　)', highlighted)}」`;
            } else {
                qEl.innerText = `「${item.問題文}」`;
            }
        } else if (item.セクション === 'ケーススタディ') {
            document.getElementById('case-answer-area').classList.toggle('hidden', !isAnswerShowing);
        }
    }

    function togglePoints() {
        const item = presenterQueue[currentSlideIdx];
        const body = document.getElementById('points-body');
        const btn = document.getElementById('btn-toggle-points');
        isPointsShowing = !isPointsShowing;
        body.classList.toggle('hidden', !isPointsShowing);
        btn.innerText = isPointsShowing ? 'ポイントを隠す' : `第${item.回}回のポイント`;
    }

    function nextSlide() {
        if (currentSlideIdx < presenterQueue.length - 1) {
            currentSlideIdx++;
            renderSlide();
        }
    }

    function prevSlide() {
        if (currentSlideIdx > 0) {
            currentSlideIdx--;
            renderSlide();
        }
    }

</script>
</body>
</html>
